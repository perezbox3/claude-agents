<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 860" font-family="Segoe UI, Inter, Arial, sans-serif">
  <defs>
    <marker id="w" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#e6edf3"/></marker>
    <marker id="g" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#3fb950"/></marker>
    <marker id="r" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#f85149"/></marker>
    <marker id="b" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#8b949e"/></marker>
  </defs>
  <rect width="1340" height="860" fill="#0d1117"/>

  <text x="40" y="46" fill="#e6edf3" font-size="22" font-weight="700">The Agent Team Loop</text>
  <text x="40" y="70" fill="#8b949e" font-size="13">One human, five seats. You write every line of code; the agents plan, advise, gate, and untangle.</text>

  <!-- tech-lead (top) -->
  <rect x="470" y="100" width="400" height="120" rx="12" fill="#15110a" stroke="#e3b341" stroke-width="2"/>
  <text x="670" y="126" fill="#e3b341" font-size="14" font-weight="700" text-anchor="middle">tech-lead  ·  1 PLAN</text>
  <text x="670" y="148" fill="#e6edf3" font-size="10.5" text-anchor="middle">goal -> scoped tasks, each with a definition of done + first step</text>
  <text x="670" y="166" fill="#8b949e" font-size="10.5" text-anchor="middle">standup: ON-TRACK / RABBIT-HOLE / BLOCKED calls</text>
  <text x="670" y="184" fill="#8b949e" font-size="10.5" text-anchor="middle">done-check: grades the work against its own DoD</text>
  <text x="670" y="206" fill="#665526" font-size="9.5" text-anchor="middle">one task in flight · max ~3 tasks planned ahead</text>

  <!-- developer (center) -->
  <rect x="490" y="300" width="360" height="140" rx="12" fill="#161b22" stroke="#e6edf3" stroke-width="2.5"/>
  <text x="670" y="334" fill="#e6edf3" font-size="17" font-weight="700" text-anchor="middle">YOU  ·  2 BUILD</text>
  <text x="670" y="360" fill="#8b949e" font-size="11" text-anchor="middle">you write every line of code</text>
  <text x="670" y="380" fill="#8b949e" font-size="11" text-anchor="middle">a branch per task, commits small and honest</text>
  <text x="670" y="400" fill="#8b949e" font-size="11" text-anchor="middle">tests ride with the task, not after the project</text>
  <text x="670" y="424" fill="#3fb950" font-size="10" font-weight="700" text-anchor="middle">the agents advise and gate; they never build for you</text>

  <!-- senior-dev-mentor (right) -->
  <rect x="950" y="300" width="350" height="140" rx="12" fill="#0a1f2c" stroke="#00d4ff" stroke-width="2"/>
  <text x="1125" y="326" fill="#00d4ff" font-size="14" font-weight="700" text-anchor="middle">senior-dev-mentor  ·  3 DISCUSS</text>
  <text x="1125" y="350" fill="#e6edf3" font-size="10.5" text-anchor="middle">options with tradeoffs + ONE clear recommendation</text>
  <text x="1125" y="368" fill="#8b949e" font-size="10.5" text-anchor="middle">explains the why at your level, measures before claiming</text>
  <text x="1125" y="386" fill="#8b949e" font-size="10.5" text-anchor="middle">snippets only; never writes your feature</text>
  <text x="1125" y="410" fill="#8b949e" font-size="10.5" text-anchor="middle">ends with questions that build your judgment</text>

  <!-- diagnostic-engineer (left) -->
  <rect x="40" y="300" width="350" height="140" rx="12" fill="#150f24" stroke="#a371f7" stroke-width="2"/>
  <text x="215" y="326" fill="#a371f7" font-size="14" font-weight="700" text-anchor="middle">diagnostic-engineer  ·  WHEN STUCK</text>
  <text x="215" y="350" fill="#e6edf3" font-size="10.5" text-anchor="middle">maps the system with file:line anchors</text>
  <text x="215" y="368" fill="#8b949e" font-size="10.5" text-anchor="middle">traces the symptom: CONFIRMED / SUSPECTED / RULED-OUT</text>
  <text x="215" y="386" fill="#8b949e" font-size="10.5" text-anchor="middle">blast radius: what else hangs off the same root</text>
  <text x="215" y="410" fill="#8b949e" font-size="10.5" text-anchor="middle">teaches the trace so you can run it next time</text>

  <!-- gate (bottom) -->
  <rect x="420" y="520" width="500" height="180" rx="12" fill="#0e1a12" stroke="#3fb950" stroke-width="2"/>
  <text x="670" y="546" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">4 GATE  ·  nothing merges unreviewed</text>
  <rect x="445" y="562" width="220" height="110" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.3"/>
  <text x="555" y="586" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">code-reviewer</text>
  <text x="555" y="606" fill="#e6edf3" font-size="9.5" text-anchor="middle">edge cases · failure paths</text>
  <text x="555" y="622" fill="#8b949e" font-size="9.5" text-anchor="middle">happy-path-only code is the defect</text>
  <text x="555" y="644" fill="#8b949e" font-size="9.5" text-anchor="middle">BLOCK / APPROVE-WITH-NOTES / APPROVE</text>
  <rect x="680" y="562" width="220" height="110" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.3"/>
  <text x="790" y="586" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">security-reviewer</text>
  <text x="790" y="606" fill="#e6edf3" font-size="9.5" text-anchor="middle">auth · input · secrets · money</text>
  <text x="790" y="622" fill="#8b949e" font-size="9.5" text-anchor="middle">always when the task touches these</text>
  <text x="790" y="644" fill="#8b949e" font-size="9.5" text-anchor="middle">attacker's perspective · BLOCK / PASS</text>

  <!-- done chip -->
  <rect x="1000" y="555" width="260" height="110" rx="12" fill="#0e1a12" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="1130" y="585" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">DONE</text>
  <text x="1130" y="608" fill="#e6edf3" font-size="10" text-anchor="middle">merged · tests passing</text>
  <text x="1130" y="626" fill="#8b949e" font-size="10" text-anchor="middle">runnable by someone else</text>
  <text x="1130" y="644" fill="#8b949e" font-size="10" text-anchor="middle">from the README</text>

  <!-- arrows -->
  <!-- plan down -->
  <line x1="670" y1="220" x2="670" y2="297" stroke="#e6edf3" stroke-width="2" marker-end="url(#w)"/>
  <text x="682" y="265" fill="#8b949e" font-size="10">the plan</text>
  <!-- standup loop (dashed, dev -> tech-lead) -->
  <path d="M 830 298 L 855 222" fill="none" stroke="#8b949e" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#b)"/>
  <text x="858" y="262" fill="#8b949e" font-size="9.5">standup: am I on track?</text>
  <!-- dev <-> mentor -->
  <line x1="852" y1="345" x2="947" y2="345" stroke="#e6edf3" stroke-width="1.6" marker-end="url(#w)"/>
  <text x="858" y="336" fill="#8b949e" font-size="9.5">show your work</text>
  <line x1="947" y1="400" x2="852" y2="400" stroke="#00d4ff" stroke-width="1.6" marker-end="url(#w)"/>
  <text x="858" y="418" fill="#8b949e" font-size="9.5">options + the why</text>
  <!-- dev <-> diagnostic -->
  <line x1="488" y1="345" x2="393" y2="345" stroke="#e6edf3" stroke-width="1.6" marker-end="url(#w)"/>
  <text x="398" y="336" fill="#8b949e" font-size="9.5">I'm lost / it breaks</text>
  <line x1="393" y1="400" x2="488" y2="400" stroke="#a371f7" stroke-width="1.6" marker-end="url(#w)"/>
  <text x="398" y="418" fill="#8b949e" font-size="9.5">map + trace + fix shape</text>
  <!-- dev -> gate, gate -> dev (block) -->
  <line x1="620" y1="440" x2="620" y2="517" stroke="#e6edf3" stroke-width="2" marker-end="url(#w)"/>
  <text x="500" y="483" fill="#8b949e" font-size="10">submit for review</text>
  <line x1="720" y1="517" x2="720" y2="440" stroke="#f85149" stroke-width="1.6" marker-end="url(#r)"/>
  <text x="732" y="483" fill="#f85149" font-size="10">BLOCK: fix + resubmit</text>
  <!-- gate -> done -->
  <line x1="922" y1="610" x2="997" y2="610" stroke="#3fb950" stroke-width="2" marker-end="url(#g)"/>
  <text x="928" y="600" fill="#3fb950" font-size="10">APPROVE</text>

  <!-- rules strip -->
  <rect x="40" y="740" width="1260" height="80" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="766" fill="#e6edf3" font-size="11.5" font-weight="700">RULES OF THE ROAD</text>
  <text x="60" y="792" fill="#8b949e" font-size="10.5">· Nothing merges unreviewed - the gates are the point of a team</text>
  <text x="480" y="792" fill="#8b949e" font-size="10.5">· Diagnose before you fix - no cause asserted without evidence</text>
  <text x="900" y="792" fill="#8b949e" font-size="10.5">· Plan before you build - done is defined before you start</text>
</svg>
