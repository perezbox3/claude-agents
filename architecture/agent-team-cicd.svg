<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Segoe UI, Inter, Arial, sans-serif">
  <defs>
    <marker id="w" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#e6edf3"/></marker>
    <marker id="b" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#8b949e"/></marker>
  </defs>
  <rect width="1400" height="800" fill="#0d1117"/>

  <text x="40" y="44" fill="#e6edf3" font-size="22" font-weight="700">Beyond MVP - the agent-assisted delivery pipeline</text>
  <text x="40" y="68" fill="#8b949e" font-size="13">The pipeline runs left to right; below each stage sit its seats. Solid border = in your pack today. Dashed = seats you add as the product grows.</text>

  <!-- learn loop back -->
  <path d="M 1276 102 L 1276 86 L 124 86 L 124 102" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#b)"/>
  <text x="700" y="81" fill="#8b949e" font-size="9.5" text-anchor="middle">what you learn operating feeds the next plan</text>

  <!-- pipeline stages -->
  <!-- 1 PLAN -->
  <rect x="40" y="104" width="168" height="76" rx="10" fill="#15110a" stroke="#e3b341" stroke-width="2"/>
  <text x="124" y="134" fill="#e3b341" font-size="14" font-weight="700" text-anchor="middle">1  PLAN</text>
  <text x="124" y="156" fill="#8b949e" font-size="9.5" text-anchor="middle">scope the work</text>
  <!-- 2 CODE -->
  <rect x="232" y="104" width="168" height="76" rx="10" fill="#150f24" stroke="#a371f7" stroke-width="2"/>
  <text x="316" y="134" fill="#a371f7" font-size="14" font-weight="700" text-anchor="middle">2  CODE</text>
  <text x="316" y="156" fill="#8b949e" font-size="9.5" text-anchor="middle">a branch per task</text>
  <!-- 3 BUILD/CI -->
  <rect x="424" y="104" width="168" height="76" rx="10" fill="#161b22" stroke="#8b949e" stroke-width="2"/>
  <text x="508" y="134" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">3  BUILD / CI</text>
  <text x="508" y="156" fill="#8b949e" font-size="9.5" text-anchor="middle">lint · deps · secrets</text>
  <!-- 4 TEST -->
  <rect x="616" y="104" width="168" height="76" rx="10" fill="#10233a" stroke="#58a6ff" stroke-width="2"/>
  <text x="700" y="134" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle">4  TEST</text>
  <text x="700" y="156" fill="#8b949e" font-size="9.5" text-anchor="middle">prove the behavior</text>
  <!-- 5 REVIEW -->
  <rect x="808" y="104" width="168" height="76" rx="10" fill="#0a1f2c" stroke="#00d4ff" stroke-width="2"/>
  <text x="892" y="134" fill="#00d4ff" font-size="14" font-weight="700" text-anchor="middle">5  REVIEW</text>
  <text x="892" y="156" fill="#8b949e" font-size="9.5" text-anchor="middle">the merge gate</text>
  <!-- 6 DEPLOY -->
  <rect x="1000" y="104" width="168" height="76" rx="10" fill="#0e1a12" stroke="#3fb950" stroke-width="2"/>
  <text x="1084" y="134" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">6  DEPLOY</text>
  <text x="1084" y="156" fill="#8b949e" font-size="9.5" text-anchor="middle">dev first, prod deliberate</text>
  <!-- 7 OPERATE -->
  <rect x="1192" y="104" width="168" height="76" rx="10" fill="#161b22" stroke="#e6edf3" stroke-width="2"/>
  <text x="1276" y="134" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">7  OPERATE</text>
  <text x="1276" y="156" fill="#8b949e" font-size="9.5" text-anchor="middle">watch · learn · fix</text>

  <!-- stage arrows -->
  <line x1="208" y1="142" x2="230" y2="142" stroke="#e6edf3" stroke-width="2" marker-end="url(#w)"/>
  <line x1="400" y1="142" x2="422" y2="142" stroke="#e6edf3" stroke-width="2" marker-end="url(#w)"/>
  <line x1="592" y1="142" x2="614" y2="142" stroke="#e6edf3" stroke-width="2" marker-end="url(#w)"/>
  <line x1="784" y1="142" x2="806" y2="142" stroke="#e6edf3" stroke-width="2" marker-end="url(#w)"/>
  <line x1="976" y1="142" x2="998" y2="142" stroke="#e6edf3" stroke-width="2" marker-end="url(#w)"/>
  <line x1="1168" y1="142" x2="1190" y2="142" stroke="#e6edf3" stroke-width="2" marker-end="url(#w)"/>

  <!-- connectors stage -> bucket -->
  <line x1="124" y1="180" x2="124" y2="204" stroke="#30363d" stroke-width="1.5"/>
  <line x1="316" y1="180" x2="316" y2="204" stroke="#30363d" stroke-width="1.5"/>
  <line x1="508" y1="180" x2="508" y2="204" stroke="#30363d" stroke-width="1.5"/>
  <line x1="700" y1="180" x2="700" y2="204" stroke="#30363d" stroke-width="1.5"/>
  <line x1="892" y1="180" x2="892" y2="204" stroke="#30363d" stroke-width="1.5"/>
  <line x1="1084" y1="180" x2="1084" y2="204" stroke="#30363d" stroke-width="1.5"/>
  <line x1="1276" y1="180" x2="1276" y2="204" stroke="#30363d" stroke-width="1.5"/>

  <!-- buckets: column 1 PLAN -->
  <rect x="40" y="206" width="168" height="86" rx="8" fill="#15110a" stroke="#e3b341" stroke-width="1.5"/>
  <text x="124" y="228" fill="#e3b341" font-size="11" font-weight="700" text-anchor="middle">tech-lead</text>
  <text x="124" y="248" fill="#e6edf3" font-size="9" text-anchor="middle">goal -> tasks + DoD</text>
  <text x="124" y="263" fill="#8b949e" font-size="9" text-anchor="middle">standup · done-check</text>
  <text x="124" y="281" fill="#8b949e" font-size="9" text-anchor="middle">first step always named</text>
  <rect x="40" y="302" width="168" height="74" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="124" y="324" fill="#e3b341" font-size="11" font-weight="700" text-anchor="middle">architect-reviewer</text>
  <text x="124" y="344" fill="#8b949e" font-size="9" text-anchor="middle">interrogates non-trivial</text>
  <text x="124" y="359" fill="#8b949e" font-size="9" text-anchor="middle">designs before building</text>

  <!-- column 2 CODE -->
  <rect x="232" y="206" width="168" height="86" rx="8" fill="#161b22" stroke="#e6edf3" stroke-width="1.5"/>
  <text x="316" y="228" fill="#e6edf3" font-size="11" font-weight="700" text-anchor="middle">YOU</text>
  <text x="316" y="248" fill="#e6edf3" font-size="9" text-anchor="middle">every line is yours</text>
  <text x="316" y="263" fill="#8b949e" font-size="9" text-anchor="middle">one task in flight</text>
  <text x="316" y="281" fill="#8b949e" font-size="9" text-anchor="middle">tests ride with the task</text>
  <rect x="232" y="302" width="168" height="74" rx="8" fill="#0a1f2c" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="316" y="324" fill="#00d4ff" font-size="11" font-weight="700" text-anchor="middle">senior-dev-mentor</text>
  <text x="316" y="344" fill="#8b949e" font-size="9" text-anchor="middle">options + tradeoffs +</text>
  <text x="316" y="359" fill="#8b949e" font-size="9" text-anchor="middle">one recommendation</text>

  <!-- column 3 BUILD/CI: rails not agents -->
  <rect x="424" y="206" width="168" height="120" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="508" y="228" fill="#e6edf3" font-size="11" font-weight="700" text-anchor="middle">deterministic rails</text>
  <text x="508" y="244" fill="#8b949e" font-size="9" font-style="italic" text-anchor="middle">(code, not agents)</text>
  <text x="508" y="264" fill="#8b949e" font-size="9" text-anchor="middle">lint + build</text>
  <text x="508" y="279" fill="#8b949e" font-size="9" text-anchor="middle">dependency CVE audit</text>
  <text x="508" y="294" fill="#8b949e" font-size="9" text-anchor="middle">secret scan</text>
  <text x="508" y="314" fill="#e6edf3" font-size="9" font-weight="700" text-anchor="middle">block on failure, always</text>

  <!-- column 4 TEST -->
  <rect x="616" y="206" width="168" height="100" rx="8" fill="#10233a" stroke="#58a6ff" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="700" y="228" fill="#58a6ff" font-size="11" font-weight="700" text-anchor="middle">test-engineer</text>
  <text x="700" y="248" fill="#8b949e" font-size="9" text-anchor="middle">behavior over coverage</text>
  <text x="700" y="263" fill="#8b949e" font-size="9" text-anchor="middle">failure paths + isolation</text>
  <text x="700" y="278" fill="#8b949e" font-size="9" text-anchor="middle">a regression test per bug</text>
  <text x="700" y="296" fill="#e6edf3" font-size="9" font-weight="700" text-anchor="middle">suites run IN the pipeline</text>

  <!-- column 5 REVIEW -->
  <rect x="808" y="206" width="168" height="86" rx="8" fill="#0e1a12" stroke="#3fb950" stroke-width="1.5"/>
  <text x="892" y="228" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">code-reviewer</text>
  <text x="892" y="248" fill="#8b949e" font-size="9" text-anchor="middle">edge cases · failure paths</text>
  <text x="892" y="263" fill="#8b949e" font-size="9" text-anchor="middle">MUST-FIX = BLOCK</text>
  <text x="892" y="281" fill="#e6edf3" font-size="9" font-weight="700" text-anchor="middle">nothing merges unreviewed</text>
  <rect x="808" y="302" width="168" height="74" rx="8" fill="#0e1a12" stroke="#3fb950" stroke-width="1.5"/>
  <text x="892" y="324" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">security-reviewer</text>
  <text x="892" y="344" fill="#8b949e" font-size="9" text-anchor="middle">auth · input · secrets ·</text>
  <text x="892" y="359" fill="#8b949e" font-size="9" text-anchor="middle">money · outbound calls</text>

  <!-- column 6 DEPLOY -->
  <rect x="1000" y="206" width="168" height="100" rx="8" fill="#0e1a12" stroke="#3fb950" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="1084" y="228" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">devops-engineer</text>
  <text x="1084" y="248" fill="#8b949e" font-size="9" text-anchor="middle">repeatable deploys</text>
  <text x="1084" y="263" fill="#8b949e" font-size="9" text-anchor="middle">rollback path always</text>
  <text x="1084" y="278" fill="#8b949e" font-size="9" text-anchor="middle">observability + health</text>
  <text x="1084" y="296" fill="#e6edf3" font-size="9" font-weight="700" text-anchor="middle">tested restore = a backup</text>

  <!-- column 7 OPERATE -->
  <rect x="1192" y="206" width="168" height="86" rx="8" fill="#150f24" stroke="#a371f7" stroke-width="1.5"/>
  <text x="1276" y="228" fill="#a371f7" font-size="11" font-weight="700" text-anchor="middle">diagnostic-engineer</text>
  <text x="1276" y="248" fill="#8b949e" font-size="9" text-anchor="middle">incident map + trace</text>
  <text x="1276" y="263" fill="#8b949e" font-size="9" text-anchor="middle">CONFIRMED vs SUSPECTED</text>
  <text x="1276" y="281" fill="#8b949e" font-size="9" text-anchor="middle">blast radius of the root</text>
  <rect x="1192" y="302" width="168" height="74" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="1276" y="324" fill="#e6edf3" font-size="11" font-weight="700" text-anchor="middle">docs-engineer</text>
  <text x="1276" y="344" fill="#8b949e" font-size="9" text-anchor="middle">runbooks · restore notes</text>
  <text x="1276" y="359" fill="#8b949e" font-size="9" text-anchor="middle">docs drift vs the code</text>

  <!-- THE STAGE GATE between REVIEW and DEPLOY -->
  <line x1="988" y1="96" x2="988" y2="430" stroke="#e3b341" stroke-width="3" stroke-dasharray="8 5"/>
  <rect x="640" y="442" width="700" height="140" rx="12" fill="#15110a" stroke="#e3b341" stroke-width="2"/>
  <line x1="988" y1="430" x2="988" y2="442" stroke="#e3b341" stroke-width="3"/>
  <text x="660" y="470" fill="#e3b341" font-size="13" font-weight="700">THE STAGE GATE  ·  platform-readiness-reviewer</text>
  <text x="660" y="494" fill="#e6edf3" font-size="10.5">Runs ONCE per product, when you graduate MVP -> production (first paying customer, open signups). Not a per-change gate.</text>
  <text x="660" y="514" fill="#8b949e" font-size="10.5">Audits what the lean MVP deliberately deferred: tenant/org model, entitlements, contract versioning, audit-as-feature,</text>
  <text x="660" y="530" fill="#8b949e" font-size="10.5">money/time correctness, identity/SSO path, data lifecycle, SLOs, the buyer's checklist, self-serve readiness.</text>
  <text x="660" y="556" fill="#e3b341" font-size="10.5" font-weight="700">Output: a gap list ranked by RETROFIT COST - one-way doors first. Speed now, scheduled debt review at the doorway.</text>

  <!-- legend -->
  <rect x="40" y="612" width="1320" height="76" rx="10" fill="#161b22" stroke="#30363d"/>
  <rect x="64" y="634" width="80" height="30" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="104" y="653" fill="#8b949e" font-size="9" text-anchor="middle">solid</text>
  <text x="160" y="653" fill="#e6edf3" font-size="10.5">in your pack today</text>
  <rect x="320" y="634" width="80" height="30" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="360" y="653" fill="#8b949e" font-size="9" text-anchor="middle">dashed</text>
  <text x="416" y="653" fill="#e6edf3" font-size="10.5">a seat you add as the product grows</text>
  <line x1="700" y1="634" x2="700" y2="664" stroke="#e3b341" stroke-width="3" stroke-dasharray="8 5"/>
  <text x="716" y="653" fill="#e6edf3" font-size="10.5">the once-per-product stage gate (MVP -> production)</text>

  <text x="40" y="724" fill="#3fb950" font-size="12" font-weight="700">Every stage is either a deterministic rail or a seat with a verdict. You stay the only human in the pipeline, and the only one who builds.</text>
  <text x="40" y="748" fill="#8b949e" font-size="10.5" font-style="italic">MVP phase: stages 1, 2, 5 with the pack agents are enough. Add 3-4-6-7 seats and the stage gate as real users arrive.</text>
</svg>
